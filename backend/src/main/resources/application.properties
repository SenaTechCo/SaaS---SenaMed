spring.application.name=senamed-backend

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/senamed
spring.datasource.username=senamed
spring.datasource.password=senamed
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate must never auto-generate DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- App specific ---
senamed.jwt.secret=${SENAMED_JWT_SECRET:dev-only-secret-change-me-please-this-must-be-at-least-256-bits-long-0123456789}
senamed.jwt.expiration-minutes=${SENAMED_JWT_EXPIRATION_MINUTES:1440}
senamed.cors.allowed-origins=${SENAMED_CORS_ORIGINS:http://localhost:5173}
senamed.trial.days=14
