spring.application.name=senamed-backend

# Render (and most PaaS) inject the port to bind to via $PORT - defaults to 8080 for local dev.
server.port=${PORT:8080}

# --- Datasource ---
# Host/port/user/password/database are separate env vars (rather than one pre-built
# SPRING_DATASOURCE_URL) so the JDBC URL can be assembled consistently for any provider. Neon
# (production Postgres, see render.yaml) requires sslmode=require; local/docker-compose Postgres
# has no SSL configured at all, so DB_SSL_MODE defaults to "prefer" (use SSL if offered, don't
# require it) which works against both without needing separate profiles.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:senamed}?sslmode=${DB_SSL_MODE:prefer}
spring.datasource.username=${DB_USER:senamed}
spring.datasource.password=${DB_PASSWORD:senamed}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate must never auto-generate DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# Mail delivery is a best-effort background concern (retried by AppointmentMessageScheduler on
# failure, never blocks a request) - it shouldn't flip the whole app's health status (and therefore
# a PaaS's deploy-health-check) just because SMTP isn't reachable/configured yet.
management.health.mail.enabled=false

# --- App specific ---
senamed.jwt.secret=${SENAMED_JWT_SECRET:dev-only-secret-change-me-please-this-must-be-at-least-256-bits-long-0123456789}
senamed.jwt.expiration-minutes=${SENAMED_JWT_EXPIRATION_MINUTES:1440}
senamed.cors.allowed-origins=${SENAMED_CORS_ORIGINS:http://localhost:5173}
senamed.trial.days=14

# --- Mail (Fase 4: KAN-60..64) ---
# Defaults target a local Mailhog/Mailpit-style catcher on 1025; if unset/unreachable, sends fail
# fast and are caught/logged by AppointmentMessageScheduler - expected in local dev, not a bug.
spring.mail.host=${SENAMED_MAIL_HOST:localhost}
spring.mail.port=${SENAMED_MAIL_PORT:1025}
spring.mail.username=${SENAMED_MAIL_USERNAME:}
spring.mail.password=${SENAMED_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SENAMED_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SENAMED_MAIL_SMTP_STARTTLS:false}

senamed.mail.from=${SENAMED_MAIL_FROM:no-reply@senamed.local}
# Frontend is served separately (Vite) - needed to build /confirmar/{token} and /cancelar/{token} links in emails.
senamed.frontend.base-url=${SENAMED_FRONTEND_BASE_URL:http://localhost:5173}
senamed.reminder.scheduler.fixed-rate-ms=${SENAMED_REMINDER_SCHEDULER_FIXED_RATE_MS:300000}

# --- Mercado Pago (Fase 5: KAN-65..69) ---
# No sandbox credentials yet - calls will fail (401 from Mercado Pago itself) until a real
# access-token is supplied; failures are caught/logged as 502, never crash the request.
senamed.mercadopago.access-token=${SENAMED_MP_ACCESS_TOKEN:}
senamed.mercadopago.base-url=${SENAMED_MP_BASE_URL:https://api.mercadopago.com}
# Mercado Pago's servers call the backend directly for webhooks (never through the frontend), so
# this must be publicly reachable (e.g. via ngrok) once real sandbox testing starts.
senamed.backend.base-url=${SENAMED_BACKEND_BASE_URL:http://localhost:8080}

senamed.subscription.scheduler.fixed-rate-ms=${SENAMED_SUBSCRIPTION_SCHEDULER_FIXED_RATE_MS:3600000}
senamed.subscription.past-due-grace-days=${SENAMED_SUBSCRIPTION_PAST_DUE_GRACE_DAYS:3}

# --- Google Calendar (Fase 7: KAN-78) ---
# No real Google Cloud OAuth app configured yet - calls fail (error from Google itself) until
# real client-id/secret are supplied; failures are caught/logged as 502 on the direct
# connect/callback endpoints, or left PENDING/retried in the async sync job outbox.
senamed.google.client-id=${SENAMED_GOOGLE_CLIENT_ID:}
senamed.google.client-secret=${SENAMED_GOOGLE_CLIENT_SECRET:}
senamed.google.redirect-uri=${SENAMED_GOOGLE_REDIRECT_URI:${senamed.backend.base-url}/api/public/google-calendar/callback}
# Dev-only default - must be overridden in production (same posture as senamed.jwt.secret).
senamed.google.token-encryption-key=${SENAMED_GOOGLE_TOKEN_ENCRYPTION_KEY:dev-only-change-me-in-production-0123456789abcdef}
senamed.google.calendar-sync-scheduler.fixed-rate-ms=${SENAMED_GOOGLE_CALENDAR_SYNC_SCHEDULER_FIXED_RATE_MS:60000}
