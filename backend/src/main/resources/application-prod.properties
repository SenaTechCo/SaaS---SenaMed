# --- Logging (KAN-73) ---
# Structured JSON logs (Elastic Common Schema) - only for production, kept out of the base
# application.properties so local `mvn spring-boot:run` terminal output stays human-readable.
# Uses Spring Boot's native structured logging support (3.4+) - no extra dependency needed.
logging.structured.format.console=ecs
logging.level.root=INFO

# No log statement anywhere in this codebase writes an Authorization header, password, JWT, or
# Mercado Pago access token to a log - grep for `log\.` before adding one that touches a request
# body/header to keep this true.
