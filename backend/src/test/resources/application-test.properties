# Testcontainers could not be used in this environment (Docker Desktop's engine API response
# is incompatible with docker-java/testcontainers 1.20.4 here), so integration tests run against
# the same Postgres started by the root docker-compose.yml (senamed-postgres, localhost:5432).
# AbstractIntegrationTest truncates the relevant tables before every test for isolation.
spring.datasource.url=jdbc:postgresql://localhost:5432/senamed
spring.datasource.username=senamed
spring.datasource.password=senamed
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
senamed.jwt.secret=test-only-secret-key-please-do-not-use-in-prod-0123456789-abcdef
senamed.jwt.expiration-minutes=60
senamed.trial.days=14
