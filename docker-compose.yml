services:
  postgres:
    image: postgres:16
    container_name: senamed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: senamed
      POSTGRES_USER: senamed
      POSTGRES_PASSWORD: senamed
    ports:
      - "5432:5432"
    volumes:
      - senamed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senamed -d senamed"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  senamed_postgres_data:
