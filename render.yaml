# Render Blueprint (KAN-70) - defines the backend web service. Import this at
# https://dashboard.render.com/blueprints ("New Blueprint Instance") pointing at this repo; Render
# reads this file automatically from the repo root.
#
# Postgres is NOT hosted on Render (its managed Postgres, even on the free plan, requires a credit
# card on file) - it runs on Neon (https://neon.tech), a free serverless Postgres that doesn't
# require a card. Fill in DB_HOST/DB_NAME/DB_USER/DB_PASSWORD below with your Neon connection
# details after creating the project there.
#
# `sync: false` env vars are intentionally left blank here (secrets/environment-specific values are
# never committed) - Render will prompt for each one in the dashboard on first deploy.
services:
  - type: web
    name: senamed-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        sync: false # Neon connection details, e.g. ep-xxxx.us-east-2.aws.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: require # Neon requires SSL; local/docker-compose Postgres does not (see application.properties)
      - key: SENAMED_JWT_SECRET
        generateValue: true
      - key: SENAMED_CORS_ORIGINS
        sync: false # the Vercel frontend URL, e.g. https://senamed.vercel.app
      - key: SENAMED_FRONTEND_BASE_URL
        sync: false # same Vercel URL - used to build links in emails and Mercado Pago back_urls
      - key: SENAMED_BACKEND_BASE_URL
        sync: false # this service's own public URL, e.g. https://senamed-backend.onrender.com
      - key: SENAMED_MAIL_HOST
        sync: false
      - key: SENAMED_MAIL_PORT
        sync: false
      - key: SENAMED_MAIL_USERNAME
        sync: false
      - key: SENAMED_MAIL_PASSWORD
        sync: false
      - key: SENAMED_MAIL_FROM
        sync: false
      - key: SENAMED_MP_ACCESS_TOKEN
        sync: false
